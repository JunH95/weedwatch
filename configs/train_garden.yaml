# Stage 3 학습 데이터 생성용 CropCraft 설정.
# CropCraft 내장 렌더가 RGB(images/) + 세그멘테이션 마스크(masks/) 쌍을 자동 생성한다.
#   crops(beds:) → 초록, weeds(weeds:) → 빨강, 흙/배경 → 검정 (3클래스).
# 주의: oracle_test.yaml 과 다르다: 저긴 채점 잡초를 beds: 에 넣어 GT 좌표를 뽑지만(오라클),
#    학습은 마스크가 라벨이라 잡초를 weeds: 에 둬야 빨강으로 칠해진다.
# 자연광 HDRI (DECISIONS 014 — LED 터널 폐기). 어린 식물(weed-early 체제).
# 학습/평가 시드 분리: 이건 train (configs/train_seeds.txt 와 맞출 것).

output:
  blender:
    type: blender_file
    filename: train_garden.blend

render:
  directory: render
  env_path: /home/sunny/projects/weedwatch/third_party/cropcraft/assets/environments/alps_field_1k.hdr
  env_rotation_deg: 0.0
  frames: 8              # 시드당 프레임(카메라가 두둑 따라 이동). bake 는 시드×이 값 = 총 장수
  samples: 20
  cycles_device: GPU
  resolution_x: 1280      # 로봇 down_cam(D405) 정합 — 온-루프 인식이 학습 분포와 같아야 (DECISIONS 021-5)
  resolution_y: 720
  camera:
    height: 0.33        # 로봇 카메라 실제 높이(두둑 위 ~0.33m, garden_geometry.camera_height_above_bed)
    fov_deg: 87.0       # D405 HFOV 87° (make_urdf down_cam 과 동일). 옛 0.5m/80°/640² 는 "D405 근사"였음
    pitch_deg: 0.0      # 정하방
    y_jitter: 0.06
  label_colors:              # 4클래스 (콩/옥수수 분리) — DECISIONS 016. crops 키가 이걸 켠다.
    crops:                   # 작물 종류별 색 (CropCraft 는 이미 bed 별 컬렉션이라 색만 다르게)
      bean:  [0, 255, 0]     # 콩 = 초록
      maize: [0, 0, 255]     # 옥수수 = 파랑 (검정/초록/빨강과 RGB 축상 최대 분리 → 양자화 안전)
    weed:       [255, 0, 0]  # 잡초 = 빨강
    background: [0, 0, 0]    # 흙 = 검정

field:
  random_seed: 1        # train

  headland_width: 0.6
  bed_width: 0.9
  length: 2.5

  beds:
    bean:
      plant_type: bean
      plant_height: 0.13        # 어린 콩
      plant_distance: 0.18
      row_distance: 0.20
      rows_count: 4
      plants_count: 12
    maize:
      plant_type: maize
      plant_height: 0.21        # 어린 옥수수 (small)
      plant_distance: 0.25
      row_distance: 0.35
      rows_count: 2
      plants_count: 8

  # 잡초 밀도 = 문헌 근거로 확정 (docs/DECISIONS.md 015, docs/REFERENCES.md). 임의 아님.
  #   목표 잡초 픽셀 ~4–8% (현재 이 값으로 4.55%). 실제 밭 잡초는 바이오매스 중앙값 4%
  #   (PMC11272534)이고 실제 top-down weed-seg 데이터셋은 오히려 더 적다(Bonn 0.7%,
  #   Corn-Weed 4.0% ≈ 우리). 4.55%는 정상~높은 수준 — 부족이 아니다.
  # 주의: density 를 더 올리지 마라. CropCraft 는 겹침 없이 심어 ~4.5%에서 포화하고, 현실적
  #   밀도로 맞춰도 잡초 클래스는 ~0.35 mIoU 에 갇힌다(Klein arXiv:2403.18351). 진짜 레버는
  #   공간(군집/줄근처)·copy-paste 증강·가중손실 — Stage 3-2 로 이월(DECISIONS 015).
  # max_height 는 어린 잡초로 유지 — sim-to-real 제약은 '작다'지 '드물다'가 아니다.
  weeds:
    portulaca:                  # 쇠비름 — 낮게 깔리는 지피. 한국 밭 여름 우점(KISTI 8.1%)
      plant_type: portulaca
      max_height: 0.10
      density: 36.0
    polygonum:                  # 마디풀 — 작고 무리지음
      plant_type: polygonum
      max_height: 0.15
      density: 30.0
    taraxacum:                  # 민들레 — 로제트가 커서 개수 절제(야생 밀도 단자릿수~20/m²)
      plant_type: taraxacum
      max_height: 0.08
      density: 12.0

  noise:
    position: 0.02
    tilt: 0.08
    missing: 0.1
    scale: 0.12
